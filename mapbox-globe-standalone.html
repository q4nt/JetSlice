                        'text-halo-color': 'rgba(0,0,0,0.8)',
                        'text-halo-width': 1.5
                    }
                });

                // Route info label at midpoint
                var midLon = (planeLon + destLon) / 2;
                var midLat = (planeLat + destLat) / 2;
                var routeLabel = flightName + ' -> ' + (destAirport.iata || destAirport.icao || '');

                mapInstance.addSource('dest-route-mid-src', {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [midLon, midLat] },
                        properties: { label: routeLabel }
                    }
                });

                mapInstance.addLayer({
                    id: 'dest-route-mid-label',
                    type: 'symbol',
                    source: 'dest-route-mid-src',
                    layout: {
                        'text-field': ['get', 'label'],
                        'text-size': 11,
                        'text-offset': [0, -1.2],
                        'text-anchor': 'bottom',
                        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
                        'text-allow-overlap': true
                    },
                    paint: {
                        'text-color': '#60a5fa',
                        'text-halo-color': 'rgba(0,0,0,0.7)',
                        'text-halo-width': 1.5
                    }
                });

                console.log('[PlaneRoute] Drew route line:', flightName, '->', destLabel);
            } catch (e) {
                console.warn('[PlaneRoute] Draw line error:', e.message);
            }
        }

        function clearDestinationLine() {
            if (!mapInstance) return;
            ['dest-route-line', 'dest-airport-glow', 'dest-airport-dot', 'dest-airport-label', 'dest-route-mid-label'].forEach(function (id) {
                try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
            });
            ['dest-route-line-src', 'dest-airport-dot-src', 'dest-route-mid-src'].forEach(function (id) {
                try { if (mapInstance.getSource(id)) mapInstance.removeSource(id); } catch (e) { }
            });
        }

        // --- Three.js Raycaster Hover Detection ---
        var _planeRaycaster = new THREE.Raycaster();
        var _planeMouseNDC = new THREE.Vector2();
        var _hoverDebounce = null;

        function _setRaycasterFromMapbox(raycaster, ndc, camera) {
            var camInverse = new THREE.Matrix4().copy(camera.projectionMatrix).invert();
            var near = new THREE.Vector3(ndc.x, ndc.y, 0).applyMatrix4(camInverse);
            var far = new THREE.Vector3(ndc.x, ndc.y, 1).applyMatrix4(camInverse);
            raycaster.ray.origin.copy(near);
            raycaster.ray.direction.copy(far).sub(near).normalize();
        }

        function _onPlaneMouseMove(e) {
            if (!planeLayer.scene || !planeLayer.camera || !mapInstance) return;
            if (planeLayer.isSuspended) return;

            // Convert screen coords to NDC (-1 to 1)
            var canvas = mapInstance.getCanvas();
            var rect = canvas.getBoundingClientRect();
            _planeMouseNDC.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            _planeMouseNDC.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            // Debounce raycasting to every 80ms for performance
            if (_hoverDebounce) return;
            _hoverDebounce = setTimeout(function () {
                _hoverDebounce = null;
                _performPlaneRaycast();
            }, 80);
        }

        // Walk up parent chain to find the root Group with userData.hex
        // (GLTF models are Groups; raycaster hits child meshes, not the root)
        function _findPlaneHex(obj) {
            var cur = obj;
            while (cur) {
                if (cur.userData && cur.userData.hex) return cur.userData.hex;
                cur = cur.parent;
            }
            return null;
        }

        function _getHitPlaneHex(intersects, planeMeshes, ndc) {
            if (intersects.length > 0) {
                var hit = _findPlaneHex(intersects[0].object);
                if (hit) return hit;
            }
            // Screen-space proximity fallback for small planes (30px radius = 900 sq pixels)
            if (!planeLayer.camera) return null;
            var canvas = mapInstance ? (mapInstance.getCanvasContainer() || mapInstance.getCanvas()) : document.body;
            var cw = canvas.offsetWidth || canvas.clientWidth || window.innerWidth;
            var ch = canvas.offsetHeight || canvas.clientHeight || window.innerHeight;
            var mx = (ndc.x + 1) * 0.5 * cw;
            var my = (1 - ndc.y) * 0.5 * ch;
            var closestDistSq = Infinity;
            var closestHex = null;
            var proj = new THREE.Vector3();
            for (var i = 0; i < planeMeshes.length; i++) {
                var m = planeMeshes[i];
                var wPos = new THREE.Vector3();
                m.getWorldPosition(wPos);
                proj.copy(wPos).project(planeLayer.camera);
                if (proj.z > 1 || proj.z < -1) continue; // Behind camera
                var px = (proj.x + 1) * 0.5 * cw;
                var py = (1 - proj.y) * 0.5 * ch;
                var distSq = (px - mx)*(px - mx) + (py - my)*(py - my);
                if (distSq < 900 && distSq < closestDistSq) {
                    closestDistSq = distSq;
                    closestHex = _findPlaneHex(m) || (m.userData && m.userData.hex);
                }
            }
            return closestHex;
        }

        async function _performPlaneRaycast() {
            if (!planeLayer.scene || !planeLayer.camera) return;

            _setRaycasterFromMapbox(_planeRaycaster, _planeMouseNDC, planeLayer.camera);

            // Collect all plane meshes for raycasting
            var planeMeshes = [];
            Object.keys(planeCache).forEach(function (hex) {
                var mesh = planeCache[hex];
                if (mesh && mesh.visible) {
                    mesh.updateMatrixWorld(true);
                    planeMeshes.push(mesh);
                }
            });

            if (planeMeshes.length === 0) {
                if (_currentHoverHex) {
                    _currentHoverHex = null;
                    clearDestinationLine();
                }
                return;
            }

            var intersects = _planeRaycaster.intersectObjects(planeMeshes, true);
            var hex = _getHitPlaneHex(intersects, planeMeshes, _planeMouseNDC);

            if (hex) {
                if (hex !== _currentHoverHex) {
                    _currentHoverHex = hex;
                    hoveredPlane = hex;

                    // Show flight info popup above the aircraft
                    _showFlightPopup(hex);

                    // Look up route for this aircraft
                    var route = routeCache[hex];
                    var planeData = planeDataMap[hex];
                    if (!planeData) return;

                    if (route && route.destination) {
                        // We have a route! Fetch airport coords and draw line
                        var destCode = route.destIcao || route.destination;
                        var airport = airportCache[destCode] || airportCache[route.destination];

                        if (airport) {
                            drawDestinationLine(planeData.lon, planeData.lat, airport, planeData.name || hex, route.route);
                        } else {
                            // Fetch airport coords then draw
                            // Try ICAO first, then IATA
                            var ap = await fetchAirportCoords(route.destIcao);
                            if (!ap) ap = await fetchAirportCoords(route.destination);
                            if (ap) {
                                drawDestinationLine(planeData.lon, planeData.lat, ap, planeData.name || hex, route.route);
                            } else {
                                console.log('[PlaneRoute] No airport data for:', destCode, route.destination);
                            }
                        }
                    }
                    // If no route data yet, no line drawn (graceful)
                }
            } else {
                // Mouse is not over any plane
                if (_currentHoverHex) {
                    _currentHoverHex = null;
                    hoveredPlane = null;
                    clearDestinationLine();
                    _hideFlightPopup();
                }
            }
        }

        // --- Flight Info Popup (Mapbox Popup above aircraft) ---
        var _flightPopup = null;
        var _flightPopupHex = null;

        function _showFlightPopup(hex) {
            var p = planeDataMap[hex];
            if (!p) return;

            _flightPopupHex = hex;

            // Build popup HTML
            var callsign = (p.name || p.hex || 'Unknown').trim();
            var altFt = Math.round(p.elevation_ft || 0);
            var speedKts = Math.round(p.speed_kts || p.gs || 0);
            var heading = Math.round(p.track || 0);
            var acType = p.type || p.t || '';
            var reg = p.registration || p.r || '';
            var route = routeCache[hex];
            var routeStr = route ? (route.origin + ' -> ' + route.destination) : '';
            var squawk = p.squawk || '';

            var html = '<div style="font-family:Inter,system-ui,sans-serif;font-size:12px;line-height:1.5;min-width:160px;color:#e2e8f0;">' +
                '<div style="font-weight:700;font-size:14px;color:#60a5fa;margin-bottom:4px;border-bottom:1px solid rgba(96,165,250,0.3);padding-bottom:3px;">' + callsign + '</div>';

            if (acType) html += '<div><span style="color:#94a3b8;">Type:</span> ' + acType + '</div>';
            if (reg) html += '<div><span style="color:#94a3b8;">Reg:</span> ' + reg + '</div>';
            html += '<div><span style="color:#94a3b8;">Alt:</span> ' + altFt.toLocaleString() + ' ft</div>';
            html += '<div><span style="color:#94a3b8;">Speed:</span> ' + speedKts + ' kts</div>';
            html += '<div><span style="color:#94a3b8;">Hdg:</span> ' + heading + '</div>';
            if (squawk) html += '<div><span style="color:#94a3b8;">Squawk:</span> ' + squawk + '</div>';
            if (routeStr) html += '<div style="margin-top:3px;color:#93c5fd;font-weight:600;">' + routeStr + '</div>';

            html += '</div>';

            if (!_flightPopup) {
                _flightPopup = new mapboxgl.Popup({
                    closeButton: false,
                    closeOnClick: false,
                    className: 'flight-info-popup',
                    anchor: 'bottom',
                    offset: [0, -20]
                });
            }

            _flightPopup.setLngLat([p.lon, p.lat]).setHTML(html).addTo(mapInstance);
        }

        function _updateFlightPopupPosition() {
            if (!_flightPopup || !_flightPopupHex) return;
            var p = planeDataMap[_flightPopupHex];
            if (p) {
                _flightPopup.setLngLat([p.lon, p.lat]);
            }
        }

        function _hideFlightPopup() {
            if (_flightPopup) {
                _flightPopup.remove();
            }
            _flightPopupHex = null;
        }

        // Inject popup CSS styles
        (function _injectFlightPopupCSS() {
            var style = document.createElement('style');
            style.textContent = '' +
                '.flight-info-popup .mapboxgl-popup-content {' +
                '  background: rgba(15, 23, 42, 0.92);' +
                '  border: 1px solid rgba(96, 165, 250, 0.35);' +
                '  border-radius: 8px;' +
                '  padding: 8px 12px;' +
                '  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 12px rgba(96,165,250,0.15);' +
                '  backdrop-filter: blur(8px);' +
                '}' +
                '.flight-info-popup .mapboxgl-popup-tip {' +
                '  border-top-color: rgba(15, 23, 42, 0.92);' +
                '}' +
                '.flight-info-popup-selected .mapboxgl-popup-content {' +
                '  border-color: rgba(96, 165, 250, 0.7);' +
                '  box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 20px rgba(96,165,250,0.3);' +
                '}';
            document.head.appendChild(style);
        })();

        // --- Camera Follow System ---
        var _followHex = null;
        var _followInterval = null;
        var FOLLOW_INTERVAL = 1200; // ms between camera updates

        function _startFollowing(hex) {
            if (_followHex === hex) return; // already following
            _stopFollowing();

            _followHex = hex;
            selectedPlane = hex;

            // Highlight the selected plane
            var mesh = planeCache[hex];
            if (mesh) {
                // Save original colors before overwriting
                mesh._savedColors = [];
                mesh.traverse(function (child) {
                    if (child.isMesh && child.material) {
                        mesh._savedColors.push({ mesh: child, color: child.material.color.clone() });
                        child.material.color.set(0xffffff); // White highlight
                        child.material.emissive = new THREE.Color(0x60a5fa);
                        child.material.emissiveIntensity = 0.4;
                    }
                });
            }

            // Initial fly-to
            var p = planeDataMap[hex];
            if (p) {
                mapInstance.flyTo({
                    center: [p.lon, p.lat],
                    zoom: Math.max(mapInstance.getZoom(), 7),
                    speed: 1.5,
                    curve: 1.2
                });
            }

            // Continuous tracking
            _followInterval = setInterval(function () {
                if (!_followHex) return;
                var fp = planeDataMap[_followHex];
                if (!fp) {
                    _stopFollowing();
                    return;
                }

                mapInstance.easeTo({
                    center: [fp.lon, fp.lat],
                    duration: FOLLOW_INTERVAL,
                    easing: function (t) { return t * (2 - t); } // ease-out-quad
                });

                // Update popup position too
                _updateFlightPopupPosition();
                _showFlightPopup(_followHex); // refresh data fields
            }, FOLLOW_INTERVAL);

            console.log('[PlaneFollow] Started following:', hex, planeDataMap[hex] ? planeDataMap[hex].name : '');
        }

        function _stopFollowing() {
            if (!_followHex) return;

            // Restore original colors
            var mesh = planeCache[_followHex];
            if (mesh && mesh._savedColors) {
                mesh._savedColors.forEach(function (entry) {
                    if (entry.mesh && entry.mesh.material) {
                        entry.mesh.material.color.copy(entry.color);
                        entry.mesh.material.emissive = new THREE.Color(0x000000);
                        entry.mesh.material.emissiveIntensity = 0;
                    }
                });
                delete mesh._savedColors;
            }

            console.log('[PlaneFollow] Stopped following:', _followHex);
            selectedPlane = null;
            _followHex = null;

            if (_followInterval) {
                clearInterval(_followInterval);
                _followInterval = null;
            }
        }

        // ESC key to exit follow mode
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && _followHex) {
                _stopFollowing();
                _hideFlightPopup();
                clearDestinationLine();
            }
        });

        // --- Click Handler for Follow Mode ---
        function _onPlaneClick(e) {
            if (!planeLayer.scene || !planeLayer.camera || !mapInstance) return;
            if (planeLayer.isSuspended) return;

            var canvas = mapInstance.getCanvas();
            var rect = canvas.getBoundingClientRect();
            var clickNDC = new THREE.Vector2(
                ((e.clientX - rect.left) / rect.width) * 2 - 1,
                -((e.clientY - rect.top) / rect.height) * 2 + 1
            );

            var raycaster = new THREE.Raycaster();
            _setRaycasterFromMapbox(raycaster, clickNDC, planeLayer.camera);

            var planeMeshes = [];
            Object.keys(planeCache).forEach(function (hex) {
                var mesh = planeCache[hex];
                if (mesh && mesh.visible) {
                    mesh.updateMatrixWorld(true);
                    planeMeshes.push(mesh);
                }
            });

            var intersects = raycaster.intersectObjects(planeMeshes, true);
            var hex = _getHitPlaneHex(intersects, planeMeshes, clickNDC);

            if (hex) {
                    // Toggle follow: if already following this plane, stop
                    if (_followHex === hex) {
                        _stopFollowing();
                        _hideFlightPopup();
                        clearDestinationLine();
                    } else {
                        _startFollowing(hex);
                        _showFlightPopup(hex);

                        // Also show destination line if route available
                        var route = routeCache[hex];
                        var pd = planeDataMap[hex];
                        if (route && route.destination && pd) {
                            var destCode = route.destIcao || route.destination;
                            var airport = airportCache[destCode] || airportCache[route.destination];
                            if (airport) {
                                drawDestinationLine(pd.lon, pd.lat, airport, pd.name || hex, route.route);
                            } else {
                                fetchAirportCoords(route.destIcao || route.destination).then(function (ap) {
                                    if (ap) drawDestinationLine(pd.lon, pd.lat, ap, pd.name || hex, route.route);
                                });
                            }
                        }
                    }
            } else {
                // Clicked empty space: exit follow mode
                if (_followHex) {
                    _stopFollowing();
                    _hideFlightPopup();
                    clearDestinationLine();
                }
            }
        }

        // Attach raycaster to canvas once map loads
        function _attachPlaneHover() {
            if (!mapInstance) return;
            var canvas = mapInstance.getCanvas();
            if (canvas) {
                canvas.addEventListener('mousemove', _onPlaneMouseMove, { passive: true });
                canvas.addEventListener('click', _onPlaneClick);
                console.log('[PlaneRoute] Hover raycaster + click follow attached to canvas');
            }
        }

        // Wait for map load then attach
        (function _waitForMapAndAttach() {
            if (mapInstance && mapInstance.loaded && mapInstance.loaded()) {
                _attachPlaneHover();
            } else {
                setTimeout(_waitForMapAndAttach, 500);
            }
        })();


        // Category -> color mapping for satellite dots
        const SAT_COLORS = {
            ISS: 0xffd700,       // Gold
            STARLINK: 0x00e5ff,  // Cyan
            GPS: 0x00e676,       // Green
            WEATHER: 0xff9100,   // Orange
            SCIENCE: 0xea80fc,   // Purple
            MILITARY: 0xff1744,  // Red
            COMMS: 0x40c4ff,     // Light blue
            OTHER: 0xbdbdbd      // Grey
        };

        const SAT_UPDATE_INTERVAL = 10000; // 10 seconds
        const satCache = {};      // norad_id -> THREE.Group
        const satDataMap = {};    // norad_id -> satellite data
        let satGeoH = null;       // shared horizontal bar geometry
        let satGeoV = null;       // shared vertical bar geometry

        const satelliteLayer = {
            id: '3d-satellites',
            type: 'custom',
            renderingMode: '3d',
            timer: null,
            animationFrame: null,

            onAdd: function (map, gl) {
                this.camera = new THREE.PerspectiveCamera();
                this.scene = new THREE.Scene();

                // Cleanup previous groups
                Object.keys(satCache).forEach(k => {
                    if (satCache[k]) {
                        satCache[k].children.forEach(c => { if (c.material) c.material.dispose(); });
                    }
                    delete satCache[k];
                });

                this.renderer = new THREE.WebGLRenderer({
                    canvas: map.getCanvas(),
                    context: gl,
                    antialias: true,
                    powerPreference: 'high-performance'
                });
                this.renderer.autoClear = false;

                // Lighting
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
                dirLight.position.set(0, 100, 50);
                this.scene.add(dirLight);

                // Shared plus-sign bar geometries (two crossed bars)
                satGeoH = new THREE.BoxGeometry(3, 0.6, 0.6); // horizontal bar
                satGeoV = new THREE.BoxGeometry(0.6, 3, 0.6); // vertical bar

                this.map = map;
                this.fetchSatellites();
                this.timer = setInterval(() => this.fetchSatellites(), SAT_UPDATE_INTERVAL);
            },

            onRemove: function () {
                if (this.timer) { clearInterval(this.timer); this.timer = null; }
            },

            isSuspended: false,

            suspend: function () {
                if (this.isSuspended) return;
                this.isSuspended = true;
                if (this.timer) { clearInterval(this.timer); this.timer = null; }
                for (const id of Object.keys(satCache)) {
                    if (satCache[id]) satCache[id].visible = false;
                }
                if (this.map) this.map.triggerRepaint();
                console.log('[SatelliteLayer] Suspended');
            },

            resume: function () {
                if (!this.isSuspended) return;
                if (!this.map) return;
                this.isSuspended = false;
                for (const id of Object.keys(satCache)) {
                    if (satCache[id]) satCache[id].visible = true;
                }
                if (!this.timer) {
                    this.fetchSatellites();
                    this.timer = setInterval(() => this.fetchSatellites(), SAT_UPDATE_INTERVAL);
                }
                console.log('[SatelliteLayer] Resumed');
            },

            fetchSatellites: async function () {
                try {
                    const res = await fetch('http://127.0.0.1:5052/api/satellites');
                    if (!res.ok) {
                        console.warn('[SatelliteLayer] Fetch failed:', res.status, res.statusText);
                        return;
                    }
                    const data = await res.json();
                    if (data.success && data.satellites) {
                        this._fetchFailCount = 0;
                        console.log('[SatelliteLayer] Received ' + data.satellites.length + ' satellites');
                        this.updateSatellites(data.satellites);
                    } else {
                        console.warn('[SatelliteLayer] API returned:', data.error || 'no data');
                    }
                } catch (e) {
                    this._fetchFailCount = (this._fetchFailCount || 0) + 1;
                    if (this._fetchFailCount === 1) {
                        console.warn('[SatelliteLayer] Backend unreachable:', e.message);
                    }
                    if (this._fetchFailCount >= 2 && this.timer) {
                        clearInterval(this.timer);
                        this.timer = null;
                        const self = this;
                        setTimeout(function () {
                            if (!self.isSuspended && self.map) {
                                self.fetchSatellites();
                                self.timer = setInterval(() => self.fetchSatellites(), SAT_UPDATE_INTERVAL);
                            }
                        }, 30000);
                    }
                }
            },

            updateSatellites: function (satellites) {
                const currentIds = new Set();

                satellites.forEach(s => {
                    const id = String(s.norad_id);
                    currentIds.add(id);
                    satDataMap[id] = s;

                    // Proportional display altitude using logarithmic scale
                    // Maps real orbital altitudes (200-36000+ km) to visual heights (2000-12000m)
                    // so each satellite's position reflects its actual relative orbit.
                    const altKm = Math.max(s.altitude_km || 200, 200);
                    const logMin = Math.log(200);    // ~5.3  (lowest LEO)
                    const logMax = Math.log(36000);  // ~10.5 (GEO belt)
                    const t = Math.min((Math.log(altKm) - logMin) / (logMax - logMin), 1.0);
                    const displayAlt = 2000 + t * 10000; // 2000m (LEO) to 12000m (GEO)

                    const mercator = mapboxgl.MercatorCoordinate.fromLngLat(
                        [s.lon, s.lat], displayAlt
                    );
                    const meterScale = mercator.meterInMercatorCoordinateUnits();

                    // Scale dots inversely with altitude for depth cue (closer = larger)
                    const depthFactor = 1.0 - t * 0.35; // 1.0 for LEO, 0.65 for GEO
                    const dotScale = meterScale * 20000 * depthFactor;

                    if (satCache[id]) {
                        // Update position
                        const grp = satCache[id];
                        grp.position.set(mercator.x, mercator.y, mercator.z);
                        grp.scale.set(dotScale, dotScale, dotScale);
                    } else {
                        // Create new satellite plus-sign (group of two bars)
                        const color = SAT_COLORS[s.category] || SAT_COLORS.OTHER;
                        const mat = new THREE.MeshBasicMaterial({
                            color: color,
                            transparent: true,
                            opacity: 0.9
                        });

                        const grp = new THREE.Group();
                        grp.add(new THREE.Mesh(satGeoH, mat));
                        grp.add(new THREE.Mesh(satGeoV, mat));
                        grp.position.set(mercator.x, mercator.y, mercator.z);
                        grp.scale.set(dotScale, dotScale, dotScale);
                        grp.userData = { norad_id: id, isSatellite: true, name: s.name };
                        this.scene.add(grp);
                        satCache[id] = grp;
                    }
                });

                // Remove stale satellites
                Object.keys(satCache).forEach(id => {
                    if (!currentIds.has(id)) {
                        const grp = satCache[id];
                        this.scene.remove(grp);
                        grp.children.forEach(c => { if (c.material) c.material.dispose(); });
                        delete satCache[id];
                        delete satDataMap[id];
                    }
                });

                if (this.map) this.map.triggerRepaint();
                console.log('[SatelliteLayer] Scene has ' + this.scene.children.length + ' objects');
            },

            render: function (gl, matrix) {
                this.camera.projectionMatrix = new THREE.Matrix4().fromArray(matrix);
                this.renderer.resetState();
                this.renderer.render(this.scene, this.camera);
            }
        };

        // Auto-suspend plane layer on visibility change (with resume guard)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                planeLayer.suspend();
                satelliteLayer.suspend();
            } else {
                planeLayer.resume();
                satelliteLayer.resume();
            }
        });

        // ===== PUBLIC API =====
        window.Q4Globe = {
            flyTo,
            geocodeAndFlyTo,
            switchDayNight,
            getMap: () => mapInstance,
            planeLayer: planeLayer,
            satelliteLayer: satelliteLayer
        };

        // ===== AUTO-START =====
        window.addEventListener('DOMContentLoaded', () => {
            initGlobe();
        });

        // --- postMessage handlers for plane tracking ---
        window.addEventListener('message', (event) => {
            if (!event.data || !event.data.type) return;
            if (event.data.type === 'SUSPEND_TRACKING') {
                planeLayer.suspend();
            } else if (event.data.type === 'RESUME_TRACKING') {
                planeLayer.resume();
            } else if (event.data.type === 'TOGGLE_TRAILS') {
                showTrails = !!event.data.enabled;
                if (!showTrails) {
                    // Clear all trails
                    for (const hex of Object.keys(trailCache)) {
                        planeLayer.clearTrail(hex);
                    }
                }
            } else if (event.data.type === 'SET_PLANE_LAYER_VISIBLE') {
                if (event.data.visible) {
                    planeLayer.resume();
                } else {
                    planeLayer.suspend();
                }
            } else if (event.data.type === 'SET_SATELLITE_LAYER_VISIBLE') {
                if (event.data.visible) {
                    // Add the layer if not already present
                    try {
                        if (mapInstance && !mapInstance.getLayer('3d-satellites')) {
                            mapInstance.addLayer(satelliteLayer);
                            console.log('[SatelliteLayer] Layer added to map');
                        } else {
                            satelliteLayer.resume();
                        }
                    } catch (err) {
                        console.warn('[SatelliteLayer] Failed to add/resume:', err.message);
                    }
                } else {
                    satelliteLayer.suspend();
                }
            }
        });
    </script>

</body>
