<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4NT Mapbox Globe</title>

    <!-- Mapbox GL JS v3.9.0 (required for Standard style config) -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css' rel='stylesheet' />

    <!-- Three.js r160 for 3D plane rendering -->
    <script src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Default cursor (no grab hand) */
        .mapboxgl-canvas-container.mapboxgl-interactive,
        .mapboxgl-canvas-container.mapboxgl-interactive:active,
        .mapboxgl-canvas {
            cursor: default;
        }

        /* --- Day/Night Toggle --- */
        #day-night-toggle {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            gap: 2px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dn-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dn-btn:hover {
            color: white;
        }

        .dn-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- Day/Night Toggle -->
    <div id="day-night-toggle">
        <button class="dn-btn active" id="day-btn" onclick="switchDayNight('day')" title="Day">&#9788;</button>
        <button class="dn-btn" id="night-btn" onclick="switchDayNight('night')" title="Night">&#9790;</button>
    </div>

    <script>
        /**
         * Q4NT Mapbox Globe - Standalone
         * 
         * Self-contained Mapbox GL JS globe with:
         *   - Globe projection (3D sphere)
         *   - Monochrome Standard theme
         *   - Day/Night toggle (persisted to localStorage)
         *   - 3D buildings enabled
         *   - URL parameter support (?lat, ?lon, ?zoom, ?preset)
         *   - postMessage API for external control
         *
         * USAGE:
         *   1. Direct:  Open this file in a browser
         *   2. Iframe:  <iframe src="mapbox-globe-standalone.html?lat=40.7&lon=-74&zoom=10"></iframe>
         *   3. Script:  Call window.Q4Globe.flyTo(lat, lon, zoom) after load
         */

        // ===== CONFIGURATION =====
        // Default token (safe for frontend - public MapBox token).
        // Can be overridden via URL param ?token= or postMessage { type: 'SET_MAPBOX_TOKEN', token: '...' }
        let MAPBOX_TOKEN = new URLSearchParams(window.location.search).get('token')
            || window.__MAPBOX_TOKEN || 'YOUR_MAPBOX_TOKEN';

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const paramLat = parseFloat(urlParams.get('lat')) || 39.8283;   // Default: center US
        const paramLon = parseFloat(urlParams.get('lon')) || -98.5795;
        const paramZoom = parseFloat(urlParams.get('zoom')) || 3.5;
        const paramPreset = urlParams.get('preset') || null;      // 'day' or 'night'
        const paramProj = urlParams.get('proj') || 'globe';
        const paramElection = urlParams.get('election'); // e.g. '2024'
        const paramPadLeft = parseFloat(urlParams.get('padLeft')) || 0;
        const paramPadRight = parseFloat(urlParams.get('padRight')) || 0;
        let paramPadBottom = parseFloat(urlParams.get('padBottom'));
        if (isNaN(paramPadBottom)) paramPadBottom = 0;

        // ===== MAP INITIALIZATION =====
        let mapInstance = null;

        function initGlobe() {
            if (typeof mapboxgl === 'undefined') {
                document.body.innerHTML = '<div style="color:white;padding:50px;font-size:20px;">ERROR: Mapbox GL JS failed to load</div>';
                return;
            }

            mapboxgl.accessToken = MAPBOX_TOKEN;

            const map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/standard',
                projection: paramProj,
                zoom: paramZoom,
                center: [paramLon, paramLat],
                pitch: 45,
                attributionControl: false,
                padding: { left: paramPadLeft, right: paramPadRight, top: 0, bottom: paramPadBottom }
            });

            mapInstance = map;
            window.mapInstance = map;

            // Track whether map has completed initial load (for camera preservation)
            let _mapHasLoaded = false;

            map.on('style.load', () => {
                try {
                    // Save current camera position before style config changes
                    // (style reloads can reset the camera to initial center)
                    let savedCenter = null;
                    let savedZoom = null;
                    let savedPitch = null;
                    if (_mapHasLoaded) {
                        savedCenter = map.getCenter();
                        savedZoom = map.getZoom();
                        savedPitch = map.getPitch();
                    }

                    // Monochrome theme
                    map.setConfigProperty('basemap', 'theme', 'monochrome');

                    // Day/Night preset (URL param > localStorage > default 'day')
                    const preset = paramPreset
                        || localStorage.getItem('mapbox-lightPreset')
                        || 'day';
                    map.setConfigProperty('basemap', 'lightPreset', preset);
                    updateToggleUI(preset);

                    // Enable 3D buildings / objects
                    map.setConfigProperty('basemap', 'show3dObjects', true);

                    // Restore camera if this was a late style reload (not the first paint)
                    if (savedCenter) {
                        map.jumpTo({ center: savedCenter, zoom: savedZoom, pitch: savedPitch });
                        console.log('[Q4Globe] Camera restored after style reload:', savedCenter.lat.toFixed(2), savedCenter.lng.toFixed(2));
                    }

                    console.log('[Q4Globe] Theme: monochrome | Preset:', preset);
                } catch (e) {
                    console.warn('[Q4Globe] Config property failed:', e.message);
                }
            });

            // ---------- load: Map fully ready ----------
            map.on('load', () => {
                console.log('[Q4Globe] Map loaded successfully');
                _mapHasLoaded = true;

                // Process any navigation queued before load
                if (window._pendingFlyTo) {
                    const p = window._pendingFlyTo;
                    map.flyTo({ center: [p.lon, p.lat], zoom: p.zoom || 6, pitch: 15, duration: 2500 });
                    window._pendingFlyTo = null;
                }

                // ELECTION MAP LAYER (If requested)
                if (paramElection === '2024') {
                    map.addSource('us-states', {
                        type: 'geojson',
                        // Reliable open-source GeoJSON URL for US states
                        data: 'https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json'
                    });

                    const redStates = ['Alabama', 'Alaska', 'Arkansas', 'Arizona', 'Florida', 'Georgia', 'Idaho', 'Indiana', 'Iowa', 'Kansas', 'Kentucky', 'Louisiana', 'Michigan', 'Mississippi', 'Missouri', 'Montana', 'Nebraska', 'Nevada', 'North Carolina', 'North Dakota', 'Ohio', 'Oklahoma', 'Pennsylvania', 'South Carolina', 'South Dakota', 'Tennessee', 'Texas', 'Utah', 'West Virginia', 'Wisconsin', 'Wyoming'];
                    const blueStates = ['California', 'Colorado', 'Connecticut', 'Delaware', 'District of Columbia', 'Hawaii', 'Illinois', 'Maine', 'Maryland', 'Massachusetts', 'Minnesota', 'New Hampshire', 'New Jersey', 'New Mexico', 'New York', 'Oregon', 'Rhode Island', 'Vermont', 'Virginia', 'Washington'];

                    map.addLayer({
                        id: 'us-states-election-fill',
                        type: 'fill',
                        source: 'us-states',
                        paint: {
                            'fill-color': [
                                'match',
                                ['get', 'name'],
                                redStates, '#ef4444',
                                blueStates, '#3b82f6',
                                'transparent'
                            ],
                            'fill-opacity': 0.6
                        }
                    });

                    map.addLayer({
                        id: 'us-states-election-line',
                        type: 'line',
                        source: 'us-states',
                        paint: {
                            'line-color': '#ffffff',
                            'line-width': 1,
                            'line-opacity': 0.3
                        }
                    });
                }

                // ===== PLACE-LABEL INTERACTIONS (v3.9+ Interactions API) =====
                let hoveredPlaceFeature = null;
                let selectedPlaceFeature = null;

                // Highlight color for place labels
                try {
                    map.setConfigProperty('basemap', 'colorPlaceLabelHighlight', '#1d4ed8');
                } catch (e) { console.warn('[Q4Globe] colorPlaceLabelHighlight not supported:', e.message); }

                // Hover enter - highlight label + pointer cursor
                map.addInteraction('place-label-hover-enter', {
                    type: 'mouseenter',
                    target: { featuresetId: 'place-labels', importId: 'basemap' },
                    handler: (e) => {
                        if (hoveredPlaceFeature) {
                            map.setFeatureState(hoveredPlaceFeature, { highlight: false });
                        }
                        hoveredPlaceFeature = e.feature;
                        map.setFeatureState(hoveredPlaceFeature, { highlight: true });
                        map.getCanvas().style.cursor = 'pointer';
                    }
                });

                // Hover leave - remove highlight
                map.addInteraction('place-label-hover-leave', {
                    type: 'mouseleave',
                    target: { featuresetId: 'place-labels', importId: 'basemap' },
                    handler: () => {
                        if (hoveredPlaceFeature) {
                            map.setFeatureState(hoveredPlaceFeature, { highlight: false });
                            hoveredPlaceFeature = null;
                        }
                        map.getCanvas().style.cursor = '';
                    }
                });

                // Click - select label + fly to location
                map.addInteraction('place-label-click', {
                    type: 'click',
                    target: { featuresetId: 'place-labels', importId: 'basemap' },
                    handler: (e) => {
                        // Clear previous selection
                        if (selectedPlaceFeature) {
                            map.setFeatureState(selectedPlaceFeature, { select: false });
                        }
                        const name = e.feature.properties?.name || e.feature.properties?.name_en || '';
                        // Toggle: clicking same label again deselects
                        if (selectedPlaceFeature && selectedPlaceFeature.id === e.feature.id) {
                            selectedPlaceFeature = null;
                            return;
                        }
                        // Select new feature
                        selectedPlaceFeature = e.feature;
                        map.setFeatureState(selectedPlaceFeature, { select: true });
                        // Fly to the clicked location
                        if (name) {
                            const coords = e.feature.geometry?.coordinates;
                            if (coords && window.mapInstance) {
                                window.mapInstance.flyTo({
                                    center: [coords[0], coords[1]],
                                    zoom: 10,
                                    pitch: 15,
                                    duration: 2500,
                                    essential: true
                                });
                            }
                        }
                        console.log('[Q4Globe] Selected place:', name);
                        // Notify parent window of selected location
                        try {
                            if (window.parent && window.parent !== window) {
                                window.parent.postMessage({ type: 'PLACE_LABEL_CLICKED', name: name }, '*');
                            }
                        } catch (err) { }
                    }
                });

                console.log('[Q4Globe] Place-label interactions registered');
            });

            map.on('error', (e) => console.error('[Q4Globe] Map error:', e.error));

            // Forward wheel events to parent window so the scroll indicator stays in sync
            document.addEventListener('wheel', (e) => {
                try {
                    if (window.parent && window.parent !== window) {
                        window.parent.postMessage({ type: 'GLOBE_WHEEL', deltaY: e.deltaY }, '*');
                    }
                } catch (ignored) { }
            });

            // Broadcast globe movement so parent can re-project geo-locked panels
            map.on('move', () => {
                try {
                    if (window.parent && window.parent !== window) {
                        var ctr = map.getCenter();
                        window.parent.postMessage({ type: 'GLOBE_MOVED', zoom: map.getZoom(), lat: ctr.lat, lng: ctr.lng }, '*');
                    }
                } catch (ignored) { }
            });

            // Add plane layer on first load (guaranteed timing - fires after style is ready)
            map.on('load', () => {
                try {
                    if (!map.getLayer('3d-planes')) {
                        map.addLayer(planeLayer);
                        console.log('[PlaneLayer] Layer added to map on load');
                    }
                } catch (e) {
                    console.warn('[PlaneLayer] Failed to add on load:', e.message);
                }
            });

            // Re-add plane layer after style changes (day/night toggle wipes custom layers)
            map.on('style.load', () => {
                try {
                    if (!map.getLayer('3d-planes')) {
                        map.addLayer(planeLayer);
                        console.log('[PlaneLayer] Layer re-added after style change');
                    }
                } catch (e) {
                    console.warn('[PlaneLayer] Failed to re-add after style change:', e.message);
                }
                // Re-add weather layer if it was active before style change
                try {
                    if (window._owmWeatherActive && window._owmApiBase && !map.getSource('owm-weather-src')) {
                        map.addSource('owm-weather-src', {
                            type: 'raster',
                            tiles: [window._owmApiBase + '/api/weather/tile/precipitation_new/{z}/{x}/{y}'],
                            tileSize: 256,
                            attribution: 'Weather: OpenWeatherMap'
                        });
                        map.addLayer({
                            id: 'owm-weather',
                            type: 'raster',
                            source: 'owm-weather-src',
                            paint: { 'raster-opacity': 0.6 }
                        });
                        console.log('[Q4Globe] Weather layer re-added after style change');
                    }
                } catch (e) {
                    console.warn('[Q4Globe] Weather layer re-add failed:', e.message);
                }
            });
        }

        // ===== DAY/NIGHT TOGGLE =====
        function switchDayNight(preset) {
            if (!mapInstance) return;
            try {
                mapInstance.setConfigProperty('basemap', 'lightPreset', preset);
                localStorage.setItem('mapbox-lightPreset', preset);
                updateToggleUI(preset);
                console.log('[Q4Globe] Switched to:', preset);
            } catch (e) {
                console.error('[Q4Globe] lightPreset switch failed:', e);
            }
        }

        function updateToggleUI(preset) {
            document.querySelectorAll('.dn-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(preset === 'day' ? 'day-btn' : 'night-btn');
            if (btn) btn.classList.add('active');
        }

        // ===== FLY-TO API =====
        function flyTo(lat, lon, zoom) {
            if (mapInstance && mapInstance.loaded()) {
                mapInstance.flyTo({
                    center: [lon, lat],
                    zoom: zoom || 6,
                    pitch: 15,
                    duration: 2500
                });
            } else {
                // Queue until map is ready
                window._pendingFlyTo = { lat, lon, zoom };
            }
        }

        // ===== GEOCODE & FLY =====
        async function geocodeAndFlyTo(locationName, zoom) {
            try {
                const resp = await fetch(
                    `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(locationName)}.json?` +
                    `access_token=${MAPBOX_TOKEN}&types=country,region,place&limit=1`
                );
                const data = await resp.json();
                if (data.features && data.features.length > 0) {
                    const [lon, lat] = data.features[0].center;
                    console.log(`[Q4Globe] Geocoded "${locationName}" -> ${lat}, ${lon}`);
                    flyTo(lat, lon, zoom || 6);
                } else {
                    console.warn(`[Q4Globe] No results for: "${locationName}"`);
                }
            } catch (e) {
                console.error('[Q4Globe] Geocode error:', e);
            }
        }

        // ===== Country Highlight Fade-Out Helper =====
        // Animates country-highlight-border opacity to 0 over 600ms, then removes layers/source.
        // Calls onDone() after cleanup.
        var _fadeOutTimer = null;
        function _fadeOutCountryHighlight(onDone) {
            if (!mapInstance) { if (onDone) onDone(); return; }
            var layerId = 'country-highlight-border';
            if (!mapInstance.getLayer(layerId)) { if (onDone) onDone(); return; }

            // Cancel any previous fade timer
            if (_fadeOutTimer) { clearTimeout(_fadeOutTimer); _fadeOutTimer = null; }

            try {
                // Set a 600ms transition on line-opacity, then drop to 0
                mapInstance.setPaintProperty(layerId, 'line-opacity-transition', { duration: 600, delay: 0 });
                mapInstance.setPaintProperty(layerId, 'line-opacity', 0);
            } catch (e) {
                // If paint property fails, fall back to instant removal
                ['country-highlight-border', 'country-highlight-fill'].forEach(function (id) {
                    try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (ex) { }
                });
                try { if (mapInstance.getSource('country-boundaries')) mapInstance.removeSource('country-boundaries'); } catch (ex) { }
                if (onDone) onDone();
                return;
            }

            // After transition completes, remove the layers and source
            _fadeOutTimer = setTimeout(function () {
                _fadeOutTimer = null;
                ['country-highlight-border', 'country-highlight-fill'].forEach(function (id) {
                    try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
                });
                try { if (mapInstance.getSource('country-boundaries')) mapInstance.removeSource('country-boundaries'); } catch (e) { }
                if (onDone) onDone();
            }, 650); // slightly longer than 600ms transition to ensure it completes
        }

        // ===== postMessage API (for iframe control) =====
        window.addEventListener('message', (event) => {
            if (!event.data || !event.data.type) return;

            switch (event.data.type) {
                case 'CENTER_LOCATION': {
                    const { lat, lon, zoom, pitch } = event.data;
                    if (lat && lon) flyTo(lat, lon, zoom);
                    break;
                }
                case 'GET_MAP_CENTER': {
                    // Return current map center to the parent window
                    if (mapInstance) {
                        const center = mapInstance.getCenter();
                        window.parent.postMessage({
                            type: 'MAP_CENTER_RESPONSE',
                            lat: center.lat,
                            lng: center.lng
                        }, '*');
                    }
                    break;
                }
                case 'GEOCODE_LOCATION': {
                    const { locationName, zoom } = event.data;
                    if (locationName) geocodeAndFlyTo(locationName, zoom);
                    break;
                }
                case 'HIGHLIGHT_COUNTRY': {
                    // Highlight a country's border in blue using Mapbox vector boundaries
                    if (!mapInstance) break;
                    var isoCode = (event.data.isoCode || '').toUpperCase();
                    if (!isoCode || isoCode.length !== 2) break;

                    // Fade out previous highlight, then add new one
                    var _addNewHighlight = function () {
                        // Clean up any remaining layers/source (safety net after fade)
                        ['country-highlight-border', 'country-highlight-fill'].forEach(function (id) {
                            try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
                        });
                        try { if (mapInstance.getSource('country-boundaries')) mapInstance.removeSource('country-boundaries'); } catch (e) { }

                        // Use Mapbox's built-in country boundaries vector tileset (instant, no API call)
                        mapInstance.addSource('country-boundaries', {
                            type: 'vector',
                            url: 'mapbox://mapbox.country-boundaries-v1'
                        });

                        // Blue border outline only
                        mapInstance.addLayer({
                            id: 'country-highlight-border',
                            type: 'line',
                            source: 'country-boundaries',
                            'source-layer': 'country_boundaries',
                            filter: ['==', ['get', 'iso_3166_1'], isoCode],
                            paint: {
                                'line-color': '#3b82f6',
                                'line-width': 2.5,
                                'line-opacity': 0.85,
                                'line-opacity-transition': { duration: 0, delay: 0 },
                                'line-emissive-strength': 1
                            }
                        });
                        console.log('[Q4Globe] Highlighted country border:', isoCode);
                    };

                    // If a previous highlight exists, fade it out first
                    if (mapInstance.getLayer('country-highlight-border')) {
                        _fadeOutCountryHighlight(function () {
                            _addNewHighlight();
                        });
                    } else {
                        _addNewHighlight();
                    }
                    break;
                }
                case 'CLEAR_COUNTRY_HIGHLIGHT': {
                    // Fade out single-country highlight layers/source
                    _fadeOutCountryHighlight(function () {
                        console.log('[Q4Globe] Cleared country highlight (faded)');
                    });
                    // Also remove multi-country highlight layers (from HIGHLIGHT_COUNTRIES)
                    ['multi-country-border', 'multi-country-fill'].forEach(function (id) {
                        try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
                    });
                    try { if (mapInstance.getSource('multi-country-boundaries')) mapInstance.removeSource('multi-country-boundaries'); } catch (e) { }
                    break;
                }
                case 'HIGHLIGHT_COUNTRIES': {
                    // Highlight multiple countries' borders in blue simultaneously
                    if (!mapInstance) break;
                    var isoCodes = event.data.isoCodes || [];
                    if (!Array.isArray(isoCodes) || isoCodes.length === 0) break;
                    // Normalize to uppercase 2-letter codes
                    isoCodes = isoCodes.map(function (c) { return (c || '').toUpperCase(); }).filter(function (c) { return c.length === 2; });
                    if (isoCodes.length === 0) break;

                    // Clean up previous highlight layers/sources (single + multi)
                    ['country-highlight-border', 'country-highlight-fill', 'multi-country-border', 'multi-country-fill'].forEach(function (id) {
                        try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
                    });
                    try { if (mapInstance.getSource('country-boundaries')) mapInstance.removeSource('country-boundaries'); } catch (e) { }
                    try { if (mapInstance.getSource('multi-country-boundaries')) mapInstance.removeSource('multi-country-boundaries'); } catch (e) { }

                    // Add source for multi-country boundaries
                    mapInstance.addSource('multi-country-boundaries', {
                        type: 'vector',
                        url: 'mapbox://mapbox.country-boundaries-v1'
                    });

                    // Blue border outline for all countries
                    mapInstance.addLayer({
                        id: 'multi-country-border',
                        type: 'line',
                        source: 'multi-country-boundaries',
                        'source-layer': 'country_boundaries',
                        filter: ['in', ['get', 'iso_3166_1'], ['literal', isoCodes]],
                        paint: {
                            'line-color': '#3b82f6',
                            'line-width': 2.5,
                            'line-opacity': 0.85,
                            'line-emissive-strength': 1
                        }
                    });

                    // Subtle fill for highlighted countries
                    mapInstance.addLayer({
                        id: 'multi-country-fill',
                        type: 'fill',
                        source: 'multi-country-boundaries',
                        'source-layer': 'country_boundaries',
                        filter: ['in', ['get', 'iso_3166_1'], ['literal', isoCodes]],
                        paint: {
                            'fill-color': '#3b82f6',
                            'fill-opacity': 0.08
                        }
                    });

                    console.log('[Q4Globe] Highlighted multiple countries:', isoCodes.join(', '));
                    break;
                }
                case 'TRADE_TALKS_2D': {
                    if (!mapInstance) break;
                    
                    try { mapInstance.setProjection('equirectangular'); } catch(e) {}

                    if (event.data.lat !== undefined && event.data.lon !== undefined && event.data.zoom !== undefined) {
                        mapInstance.flyTo({
                            center: [event.data.lon, event.data.lat],
                            zoom: event.data.zoom,
                            pitch: 0,
                            duration: 2000
                        });
                    }

                    var ttIsoCodes = ['US', 'CN', 'GB', 'MX', 'CA'];

                    ['country-highlight-border', 'country-highlight-fill', 'multi-country-border', 'multi-country-fill'].forEach(function (id) {
                        try { if (mapInstance.getLayer(id)) mapInstance.removeLayer(id); } catch (e) { }
                    });
                    try { if (mapInstance.getSource('country-boundaries')) mapInstance.removeSource('country-boundaries'); } catch (e) { }
                    try { if (mapInstance.getSource('multi-country-boundaries')) mapInstance.removeSource('multi-country-boundaries'); } catch (e) { }

                    mapInstance.addSource('multi-country-boundaries', {
                        type: 'vector',
                        url: 'mapbox://mapbox.country-boundaries-v1'
                    });

                    mapInstance.addLayer({
                        id: 'multi-country-border',
                        type: 'line',
                        source: 'multi-country-boundaries',
                        'source-layer': 'country_boundaries',
                        filter: ['in', ['get', 'iso_3166_1'], ['literal', ttIsoCodes]],
                        paint: {
                            'line-color': '#ea580c', // Orange-ish to match tab color
                            'line-width': 3.0,
                            'line-opacity': 0.9,
                            'line-emissive-strength': 1
                        }
                    });

                        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

                                        var tags = el.tags || {};
                                        var name = tags.name || tags['name:en'] || tags.icao || tags.iata || 'Unknown Airport';
                                        var key = name + '_' + Math.round(lat * 100) + '_' + Math.round(lng * 100);
                                        if (seen[key]) return;

                                        airports.push({
                                            name: name,
                                            iata: tags.iata || '',
                                            icao: tags.icao || '',
                                            lat: lat,
                                            lng: lng,
                                            dist: _haversineDist(cityLat, cityLng, lat, lng)
                                        });
                                    });
                                    // Sort by distance and keep closest 10
                                    airports.sort(function (a, b) { return a.dist - b.dist; });
                                    airports = airports.slice(0, 10);

                                    if (airports.length === 0) {
                                        console.warn('[Q4Globe] No airports found near:', searchLocName);
                                        return;
                                    }

                                    // --- Unit toggle state ---
                                    var showMiles = false; // false = km, true = miles

                                    var midpointFeats = [];

                                        var distKm = _haversineDist(cityLat, cityLng, ap.lat, ap.lng);
                                        var distMi = distKm * 0.621371;
                                        var kmLabel = Math.round(distKm) + ' km';
                                        var miLabel = Math.round(distMi) + ' mi';
                                        // Estimated drive time at ~60 km/h average
                                        var driveHrs = distKm / 60;
                                        var driveLabel;
                                        if (driveHrs < 1) {
                                            driveLabel = Math.round(driveHrs * 60) + ' min';
                                        } else {
                                            var hrs = Math.floor(driveHrs);
                                            var mins = Math.round((driveHrs - hrs) * 60);
                                            driveLabel = hrs + 'h ' + mins + 'm';
                                        }
                                        var apLabel = ap.iata ? ap.iata + ' - ' + ap.name : ap.name;

                                        lineFeats.push({
                                            type: 'Feature',
                                            geometry: {
                                                type: 'LineString',
                                                coordinates: [[cityLng, cityLat], [ap.lng, ap.lat]]
                                            },
                                            properties: { distance: kmLabel, driveTime: driveLabel, airportName: apLabel }
                                        });
                                        midpointFeats.push({
                                            type: 'Feature',
                                            geometry: {
                                                type: 'Point',
                                                coordinates: [ap.lng, ap.lat]
                                            },
                                            properties: { distance: kmLabel, distKm: kmLabel, distMi: miLabel, idx: idx }
                                        });
                                    });

                                            type: 'Feature',

                                        ctx.closePath();

                                        ctx.lineWidth = 2;
                                        ctx.stroke();

                    function _ovHaversine(lat1, lng1, lat2, lng2) {
                        var R = 6371;
                        var dLat = (lat2 - lat1) * Math.PI / 180;
                        var dLng = (lng2 - lng1) * Math.PI / 180;
                        var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                            Math.sin(dLng / 2) * Math.sin(dLng / 2);
                        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                    }

        // --- STL PARSER ---
        function parseSTL(arrayBuffer) {
            const view = new DataView(arrayBuffer);
            const isBinary = arrayBuffer.byteLength > 84 && arrayBuffer.byteLength === (84 + view.getUint32(80, true) * 50);

            const geo = new THREE.BufferGeometry();
            const vertices = [];

            if (isBinary) {
                const nTri = view.getUint32(80, true);
                for (let i = 0; i < nTri; i++) {
                    const off = 84 + i * 50;
                    for (let j = 0; j < 3; j++) {
                        const vOff = off + 12 + j * 12;
                        vertices.push(
                            view.getFloat32(vOff, true),
                            view.getFloat32(vOff + 4, true),
                            view.getFloat32(vOff + 8, true)
                        );
                    }
                }
            } else {
                const data = new TextDecoder().decode(arrayBuffer);
                const lines = data.split('\n');
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('vertex')) {
                        const parts = line.split(/\s+/);
                        vertices.push(parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3]));
                    }
                }
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geo.computeVertexNormals();
            return geo;
        }

        // --- ALTITUDE COLOR ---
        function getAltitudeColor(altFt) {
            const alt = altFt || 0;
            if (alt < 200) return new THREE.Color(0x808080); // Grey: ground
            else if (alt < 5000) {
                const t = (alt - 200) / (5000 - 200);
                return new THREE.Color().lerpColors(new THREE.Color(0xff4500), new THREE.Color(0xffa500), t);
            }
            else if (alt < 15000) {
                const t = (alt - 5000) / (15000 - 5000);
                return new THREE.Color().lerpColors(new THREE.Color(0x32cd32), new THREE.Color(0x00ff00), t);
            }
            else if (alt < 30000) {
                const t = (alt - 15000) / (30000 - 15000);
                return new THREE.Color().lerpColors(new THREE.Color(0x1e90ff), new THREE.Color(0x0000ff), t);
            }
            else {
                const t = Math.min((alt - 30000) / 10000, 1);
                return new THREE.Color().lerpColors(new THREE.Color(0x8b00ff), new THREE.Color(0xff00ff), t);
            }
        }

            if (typeof name === 'object' && name !== null) {
                if (name.kind === 'HELICOPTER') return 'AS350-helicopter.stl';
                name = name.name || name.t || name.type || '';
            }
            if (!name) return 'B737.stl';
            name = name.toUpperCase();
            if (name.includes('737')) return 'B737.stl';
            if (name.includes('747') || /^B74[1-9SFLR]/.test(name)) return 'B747.stl';
            if (name.includes('777')) return 'B777_fixed.stl';
            if (name.includes('787')) return 'B787_fixed.stl';
            if (name.includes('A320') || name.includes('A319')) return 'A320_fixed.stl';
            if (name.includes('A380')) return 'A380_fixed.stl';
            if (name.includes('UH60') || name.includes('BLACKHAWK')) return 'UH60_fixed.stl';
            if (name.includes('C130') || name.includes('C30J')) return 'C130_fixed.stl';
            if (name.includes('CESSNA')) return 'cessna_fixed.stl';
            if (name.includes('AH-64')) return 'AH-64_Apache_Helicopter_fixed.stl';
            if (name.includes('AS350') || name.includes('AS-350') || name.includes('H125')) return 'AS350-helicopter.stl';
            if (name.includes('C17')) return 'C17_fixed.stl';
            return 'B737.stl';

        // --- HEADING CALCULATION ---
        function calculateHeading(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180;
            const toDeg = 180 / Math.PI;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) -
                Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            let heading = Math.atan2(y, x) * toDeg;
            return (heading + 360) % 360;
        }

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight1.position.set(0, 100, 50);
                this.scene.add(dirLight1);
                const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
                dirLight2.position.set(0, -50, -50);
                this.scene.add(dirLight2);
                const dirLight3 = new THREE.DirectionalLight(0xffffff, 0.2);
                dirLight3.position.set(50, 0, -50);
                this.scene.add(dirLight3);

                this.map = map;
                this.fetchPlanes();
                this.timer = setInterval(() => this.fetchPlanes(), UPDATE_INTERVAL);
                this.startAnimationLoop();
            },

            onRemove: function () { this.cleanup(); },

            cleanup: function () {
                if (this.timer) { clearInterval(this.timer); this.timer = null; }
                if (this.animationFrame) { cancelAnimationFrame(this.animationFrame); this.animationFrame = null; }
            },

            isSuspended: false,

            suspend: function () {
                if (this.isSuspended) return;
                this.isSuspended = true;
                if (this.timer) { clearInterval(this.timer); this.timer = null; }
                if (this.animationFrame) { cancelAnimationFrame(this.animationFrame); this.animationFrame = null; }
                // Hide all existing plane and trail meshes immediately
                for (const hex of Object.keys(planeCache)) {
                    if (planeCache[hex]) planeCache[hex].visible = false;
                }
                for (const hex of Object.keys(trailCache)) {
                    if (trailCache[hex] && trailCache[hex].mesh) trailCache[hex].mesh.visible = false;
                }
                if (this.map) this.map.triggerRepaint();
                console.log('[PlaneLayer] Suspended - planes hidden');
            },

            resume: function () {
                if (!this.isSuspended) return;
                if (!this.map) return;
                this.isSuspended = false;
                // Restore visibility of existing meshes
                for (const hex of Object.keys(planeCache)) {
                    if (planeCache[hex]) planeCache[hex].visible = true;
                }
                for (const hex of Object.keys(trailCache)) {
                    if (trailCache[hex] && trailCache[hex].mesh) trailCache[hex].mesh.visible = true;
                }
                if (!this.timer) {
                    this.fetchPlanes();
                    this.timer = setInterval(() => this.fetchPlanes(), UPDATE_INTERVAL);
                }
                if (!this.animationFrame) this.startAnimationLoop();
                console.log('[PlaneLayer] Resumed - planes visible');
            },

            lastAnimationTime: 0,
            targetFrameTime: 1000 / 30, // 30 FPS

            startAnimationLoop: function () {
                const animate = (currentTime) => {
                    this.animationFrame = requestAnimationFrame(animate);
                    const elapsed = currentTime - this.lastAnimationTime;
                    if (elapsed < this.targetFrameTime) return;
                    this.lastAnimationTime = currentTime;
                    this.interpolatePlanes();
                };
                animate(0);
            },

            interpolatePlanes: function () {
                const now = Date.now();
                let needsRepaint = false;

                Object.keys(planeInterpolation).forEach(hex => {
                    const interp = planeInterpolation[hex];
                    const mesh = planeCache[hex];
                    if (!mesh || !interp) return;

                    const elapsed = now - interp.startTime;
                    const t = Math.min(elapsed / interp.duration, 1.0);
                    if (t >= 1.0 && interp.complete) return;

                    // Cubic ease-out
                    const eased = 1 - Math.pow(1 - t, 3);

                    mesh.position.x = interp.startPos.x + (interp.endPos.x - interp.startPos.x) * eased;
                    mesh.position.y = interp.startPos.y + (interp.endPos.y - interp.startPos.y) * eased;
                    mesh.position.z = interp.startPos.z + (interp.endPos.z - interp.startPos.z) * eased;
                    needsRepaint = true;

                    // Shortest-path rotation interpolation
                    let rotDiff = interp.endRot - interp.startRot;
                    while (rotDiff > Math.PI) rotDiff -= 2 * Math.PI;
                    while (rotDiff < -Math.PI) rotDiff += 2 * Math.PI;
                    mesh.rotation.set(0, 0, 0);
                    mesh.rotateZ(interp.startRot + rotDiff * eased);

                    if (t >= 1.0) interp.complete = true;
                });

                if (needsRepaint && this.map) this.map.triggerRepaint();
            },

            fetchPlanes: async function () {
                try {
                    const center = this.map.getCenter();
                    const res = await fetch(`http://127.0.0.1:5052/api/planes?lat=${center.lat}&lon=${center.lng}&radius_km=150`);
                    const data = await res.json();
                    if (data.success) {
                        this._fetchFailCount = 0;
                        this.updatePlanes(data.planes);
                        const el = document.getElementById('plane-count-display');
                        if (el) el.innerText = `${data.planes.length} aircraft`;
                        updateFlightList();
                    }
                } catch (e) {
                    // Backoff: after first failure, suspend polling for 30s to avoid console spam
                    this._fetchFailCount = (this._fetchFailCount || 0) + 1;
                    if (this._fetchFailCount === 1) {
                        console.warn('[PlaneLayer] Backend unreachable, pausing plane updates for 30s');
                    }
                    if (this._fetchFailCount >= 2 && this.timer) {
                        clearInterval(this.timer);
                        this.timer = null;
                        const self = this;
                        setTimeout(function () {
                            if (!self.isSuspended && self.map) {
                                self.fetchPlanes();
                                self.timer = setInterval(() => self.fetchPlanes(), UPDATE_INTERVAL);
                            }
                        }, 30000);
                    }
                }
            },

            updatePlanes: function (planes) {
                const currentHexes = new Set();
                const now = Date.now();

                planes.forEach(p => {
                    const hex = p.hex || p.name;
                    currentHexes.add(hex);
                    planeDataMap[hex] = p;

                    const modelOrigin = [p.lon, p.lat];
                    const modelAltitude = (p.elevation_ft || 0) * 0.3048; // ft -> meters
                    const displayAlt = Math.max(modelAltitude, 100);

                    const mercator = mapboxgl.MercatorCoordinate.fromLngLat(modelOrigin, displayAlt);
                    const scale = mercator.meterInMercatorCoordinateUnits();
                    const finalScale = scale * 0.6;

                    // Heading: use track from API or compute from movement delta
                    let heading = p.track || 0;
                    if ((!p.track || p.track === 0) && planePreviousPositions[hex]) {
                        const prev = planePreviousPositions[hex];
                        const distance = Math.sqrt(Math.pow(p.lat - prev.lat, 2) + Math.pow(p.lon - prev.lon, 2));
                        if (distance > 0.0001) {
                            heading = calculateHeading(prev.lat, prev.lon, p.lat, p.lon);
                            p.track = heading;
                        } else if (planeCache[hex]) {
                            heading = -THREE.MathUtils.radToDeg(planeCache[hex].rotation.z);
                        }
                    }
                    planePreviousPositions[hex] = { lat: p.lat, lon: p.lon };

                    const targetRotation = -THREE.MathUtils.degToRad(heading);

                    if (planeCache[hex]) {
                        const mesh = planeCache[hex];
                        planeInterpolation[hex] = {
                            startPos: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
                            endPos: { x: mercator.x, y: mercator.y, z: mercator.z },
                            startRot: mesh.rotation.z,
                            endRot: targetRotation,
                            startTime: now,
                            duration: UPDATE_INTERVAL
                        };
                        if (selectedPlane !== hex) {
                            const color = getAltitudeColor(p.elevation_ft);
                            if (mesh.material && mesh.material.color) {
                                mesh.material.color.copy(color);
                                planeOriginalColors[hex] = color.clone();
                            }
                        }
                    } else {
                        const modelName = getAircraftModelName(p);
                        this.loadAndCreate(modelName, hex, mercator, finalScale, p.track, p.elevation_ft);
                    }

                    // Trail lifecycle management
                    const currentAlt = p.elevation_ft || 0;
                    const wasAirborne = planeAirborneStatus[hex];
                    const isAirborne = currentAlt > GROUND_ALTITUDE_THRESHOLD;
                    if (wasAirborne === true && !isAirborne) this.clearTrail(hex); // landed
                    if (wasAirborne === false && isAirborne) this.clearTrail(hex); // took off
                    planeAirborneStatus[hex] = isAirborne;

                    if (this.scene && isAirborne) this.updateTrail(hex, mercator);
                });

                applyFilters();

                // Remove stale aircraft
                Object.keys(planeCache).forEach(h => {
                    if (!currentHexes.has(h)) {
                        this.scene.remove(planeCache[h]);
                        delete planeCache[h];
                        delete planeDataMap[h];
                        delete planeInterpolation[h];
                        delete planePreviousPositions[h];
                        if (pinnedPanels[h]) { pinnedPanels[h].remove(); delete pinnedPanels[h]; }
                        if (trailCache[h]) {
                            this.scene.remove(trailCache[h].mesh);
                            trailCache[h].geometry.dispose();
                            if (trailCache[h].mesh.material) trailCache[h].mesh.material.dispose();
                            delete trailCache[h];
                        }
                    }
                });
            },

            clearTrail: function (hex) {
                if (trailCache[hex]) {
                    trailCache[hex].points = [];
                    if (trailCache[hex].geometry) trailCache[hex].geometry.setDrawRange(0, 0);
                }
            },

            // --- CONTRAIL / RIBBON RENDERING ---
            updateTrail: function (hex, mercator) {
                const pos = new THREE.Vector3(mercator.x, mercator.y, mercator.z);
                const scale = mercator.meterInMercatorCoordinateUnits();
                const pathWidth = 50 * scale; // 50-meter wide ribbon

                if (!trailCache[hex]) {
                    const geometry = new THREE.BufferGeometry();
                    const maxVertices = MAX_TRAIL_POINTS * 2; // Left + Right vertex per point
                    const positions = new Float32Array(maxVertices * 3);
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                    // Triangle strip indices
                    const indices = [];
                    for (let i = 0; i < MAX_TRAIL_POINTS - 1; i++) {
                        const base = i * 2;
                        indices.push(base, base + 2, base + 1);   // Tri 1
                        indices.push(base + 1, base + 2, base + 3); // Tri 2
                    }
                    geometry.setIndex(indices);
                    geometry.setDrawRange(0, 0);

                    const planeData = planeDataMap[hex];
                    const altColor = getAltitudeColor(planeData ? planeData.elevation_ft : 0);
                    const material = new THREE.MeshBasicMaterial({
                        color: altColor,
                        opacity: 0.4,
                        transparent: true,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    });

                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.frustumCulled = false;
                    this.scene.add(mesh);
                    trailCache[hex] = { mesh, geometry, points: [] };
                }

                const trail = trailCache[hex];

                // Sync trail color to current altitude
                const planeData = planeDataMap[hex];
                if (planeData && trail.mesh && trail.mesh.material) {
                    trail.mesh.material.color.copy(getAltitudeColor(planeData.elevation_ft));
                }

                // Skip duplicate positions (too close)
                if (trail.points.length > 0) {
                    const lastPos = trail.points[trail.points.length - 1];
                    if (lastPos.distanceTo(pos) < 0.00000001) return;
                }

                trail.points.push(pos);
                if (trail.points.length > MAX_TRAIL_POINTS) trail.points.shift();

                // Rebuild ribbon geometry
                const positions = trail.geometry.attributes.position.array;
                for (let i = 0; i < trail.points.length; i++) {
                    const p = trail.points[i];

                    let dir = new THREE.Vector3();
                    if (i < trail.points.length - 1) {
                        dir.subVectors(trail.points[i + 1], p).normalize();
                    } else if (i > 0) {
                        dir.subVectors(p, trail.points[i - 1]).normalize();
                    } else {
                        dir.set(1, 0, 0);
                    }

                    // Smooth direction at inner points
                    if (i > 0 && i < trail.points.length - 1) {
                        const d1 = new THREE.Vector3().subVectors(p, trail.points[i - 1]).normalize();
                        const d2 = new THREE.Vector3().subVectors(trail.points[i + 1], p).normalize();
                        dir.addVectors(d1, d2).normalize();
                    }

                    // Cross with Mercator up (Z) to get ribbon width vector
                    const up = new THREE.Vector3(0, 0, 1);
                    const right = new THREE.Vector3().crossVectors(dir, up).normalize().multiplyScalar(pathWidth / 2);
                    if (isNaN(right.x)) right.set(pathWidth / 2, 0, 0);

                    // Left vertex
                    positions[i * 6] = p.x - right.x;
                    positions[i * 6 + 1] = p.y - right.y;
                    positions[i * 6 + 2] = p.z - right.z;
                    // Right vertex
                    positions[i * 6 + 3] = p.x + right.x;
                    positions[i * 6 + 4] = p.y + right.y;
                    positions[i * 6 + 5] = p.z + right.z;
                }

                trail.geometry.attributes.position.needsUpdate = true;
                trail.geometry.setDrawRange(0, trail.points.length >= 2 ? (trail.points.length - 1) * 6 : 0);
                trail.mesh.visible = showTrails;
            },

            loadAndCreate: async function (modelName, hex, mercator, scale, heading, altFt) {
                if (loadingModels.has(modelName)) return;
                let geo = modelCache[modelName];

                if (!geo) {
                    loadingModels.add(modelName);
                    try {
                        const r = await fetch(`assets/3d-aircraft/${modelName}`);
                        if (!r.ok) throw new Error(`Failed: ${modelName}`);
                        const buf = await r.arrayBuffer();
                        geo = parseSTL(buf);

                        geo.computeBoundingBox();
                        const c = new THREE.Vector3();
                        geo.boundingBox.getCenter(c);
                        const size = new THREE.Vector3();
                        geo.boundingBox.getSize(size);
                        const maxDim = Math.max(size.x, size.y, size.z);

                        geo.translate(-c.x, -c.y, -c.z);

                        if (maxDim > 500) { // Likely mm units
                            geo.scale(0.001, 0.001, 0.001);
                            geo.rotateX(Math.PI / 2);
                            geo.rotateZ(Math.PI);
                        }

                        geo.scale(2.0, 2.0, 2.0);

                        // Merge duplicate vertices for smooth shading
                        const posAttr = geo.getAttribute('position');
                        const vertexMap = new Map();
                        const newPositions = [];
                        const newIndices = [];
                        for (let i = 0; i < posAttr.count; i++) {
                            const x = posAttr.getX(i), y = posAttr.getY(i), z = posAttr.getZ(i);
                            const key = `${x.toFixed(4)}_${y.toFixed(4)}_${z.toFixed(4)}`;
                            if (!vertexMap.has(key)) {
                                vertexMap.set(key, newPositions.length / 3);
                                newPositions.push(x, y, z);
                            }
                            newIndices.push(vertexMap.get(key));
                        }
                        const mergedGeo = new THREE.BufferGeometry();
                        mergedGeo.setAttribute('position', new THREE.Float32BufferAttribute(newPositions, 3));
                        mergedGeo.setIndex(newIndices);
                        mergedGeo.computeVertexNormals();
                        geo = mergedGeo;
                        modelCache[modelName] = geo;
                    } catch (e) {
                        loadingModels.delete(modelName);
                        return;
                    }
                    loadingModels.delete(modelName);
                }

                const color = getAltitudeColor(altFt);
                planeOriginalColors[hex] = color.clone();

                const mat = new THREE.MeshStandardMaterial({
                    color,
                    metalness: 0.3,
                    roughness: 0.5,
                    flatShading: false,
                    side: THREE.DoubleSide
                });
                const mesh = new THREE.Mesh(geo, mat);
                this.addPlaneMesh(mesh, hex, mercator, scale, heading);
            },

            addPlaneMesh: function (mesh, hex, mercator, scale, heading) {
                mesh.position.set(mercator.x, mercator.y, mercator.z);
                mesh.scale.set(scale, scale, scale);
                mesh.rotateZ(-THREE.MathUtils.degToRad(heading));
                mesh.userData = { hex, isPlane: true };
                this.scene.add(mesh);
                planeCache[hex] = mesh;
                this.map.triggerRepaint();
            },

            render: function (gl, matrix) {
                this.camera.projectionMatrix = new THREE.Matrix4().fromArray(matrix);
                this.renderer.resetState();
                this.renderer.render(this.scene, this.camera);
            }
        };

        // =====================================================
        // AIRCRAFT DESTINATION ROUTE LINE SYSTEM
        // Hover over a plane -> dashed line to destination airport
        // =====================================================

        // --- Route & Airport Caches ---
        const routeCache = {};       // hex -> { origin, destination, destIcao, _ts }
        const airportCache = {};     // ICAO -> { name, lat, lon, iata, icao }
        let _routeFetchInFlight = false;
        let _lastRouteFetchTime = 0;
        const ROUTE_FETCH_COOLDOWN = 15000; // 15s between routeset calls
        const ROUTE_CACHE_TTL = 120000;     // 2 min route cache
        let _currentHoverHex = null;

        // Determine backend origin for API calls
        function _getApiBase() {
            var base = '';
            try { base = window.location.origin; } catch (e) { }
            if (!base || base === 'null' || base === 'about:') {
                try { base = window.parent.location.origin; } catch (e2) { base = 'http://localhost:5052'; }
            }
            // If we're served from file:// fallback to localhost
            if (base.startsWith('file:')) base = 'http://127.0.0.1:5052';
            return base;
        }

        // --- Fetch routes for all visible aircraft (background, non-blocking) ---
        async function fetchRoutesForVisiblePlanes() {
            var now = Date.now();
            if (_routeFetchInFlight) return;
            if (now - _lastRouteFetchTime < ROUTE_FETCH_COOLDOWN) return;

            // Build list of aircraft with callsigns
            var planes = [];
            Object.keys(planeDataMap).forEach(function (hex) {
                var p = planeDataMap[hex];
                var callsign = (p.name || '').trim();
                // Skip if no meaningful callsign or if already cached recently
                if (!callsign || callsign === 'UNKNOWN') return;
                var cached = routeCache[hex];
                if (cached && (now - cached._ts) < ROUTE_CACHE_TTL) return;
                if (p.lat && p.lon) {
                    planes.push({ callsign: callsign, lat: p.lat, lng: p.lon });
                }
            });

            if (planes.length === 0) return;

            _routeFetchInFlight = true;
            _lastRouteFetchTime = now;

            try {
                var apiBase = _getApiBase();
                var resp = await fetch(apiBase + '/api/plane-routes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planes: planes })
                });

                if (!resp.ok) {
                    console.warn('[PlaneRoute] routeset fetch failed:', resp.status);
                    _routeFetchInFlight = false;
                    return;
                }

                var data = await resp.json();
                if (!data.success || !data.routes) {
                    _routeFetchInFlight = false;
                    return;
                }

                // Parse route data -- adsb.lol routeset returns an array with route info
                // Each entry: { callsign, _airport_codes_iata: "ORD-LAX", ... }
                var routes = data.routes;
                var routeList = Array.isArray(routes) ? routes : (routes.planes || routes.ac || []);

                routeList.forEach(function (r) {
                    var cs = (r.callsign || r.flight || '').trim();
                    if (!cs) return;

                    // Find the hex for this callsign
                    var matchHex = null;
                    Object.keys(planeDataMap).forEach(function (hex) {
                        if ((planeDataMap[hex].name || '').trim() === cs) matchHex = hex;
                    });
                    if (!matchHex) return;

                    // Extract airport codes -- various field names from adsb.lol
                    var airportStr = r._airport_codes_iata || r.airport_codes || r.route || '';
                    var airports = airportStr.split('-').map(function (s) { return s.trim(); }).filter(Boolean);

                    if (airports.length >= 2) {
                        var destIata = airports[airports.length - 1];
                        var originIata = airports[0];

                        // Try to get the ICAO from other fields
                        var destIcao = r._airport_codes_icao ? r._airport_codes_icao.split('-').pop().trim() : '';

                        routeCache[matchHex] = {
                            origin: originIata,
                            destination: destIata,
                            destIcao: destIcao,
                            originIcao: r._airport_codes_icao ? r._airport_codes_icao.split('-')[0].trim() : '',
                            route: airportStr,
                            _ts: Date.now()
                        };
                    }
                });

                var cachedCount = Object.keys(routeCache).length;
                if (cachedCount > 0) {
                    console.log('[PlaneRoute] Route cache updated:', cachedCount, 'routes');
                }
            } catch (e) {
                console.warn('[PlaneRoute] Route fetch error:', e.message);
            }

            _routeFetchInFlight = false;
        }

        // --- Fetch airport coordinates by ICAO or IATA ---
        async function fetchAirportCoords(code) {
            if (!code) return null;
            code = code.toUpperCase().trim();
            if (airportCache[code]) return airportCache[code];

            try {
                var apiBase = _getApiBase();
                var resp = await fetch(apiBase + '/api/airport/' + encodeURIComponent(code));
                if (!resp.ok) return null;
                var data = await resp.json();
                if (data.success && data.airport) {
                    airportCache[code] = data.airport;
                    // Also cache by IATA if different
                    if (data.airport.iata && data.airport.iata !== code) {
                        airportCache[data.airport.iata] = data.airport;
                    }
                    return data.airport;
                }
            } catch (e) {
                console.warn('[PlaneRoute] Airport fetch error for', code, ':', e.message);
            }
            return null;
        }

        // --- Hook into planeLayer.fetchPlanes to trigger background route fetching ---
        var _originalFetchPlanes = planeLayer.fetchPlanes;
        planeLayer.fetchPlanes = async function () {
            await _originalFetchPlanes.call(this);
            // Fire-and-forget route fetching in background
            fetchRoutesForVisiblePlanes();
        };

        // --- Draw / Clear destination route line on Mapbox ---
        function drawDestinationLine(planeLon, planeLat, destAirport, flightName, routeStr) {
            if (!mapInstance) return;

            // Clean up previous line
            clearDestinationLine();

            var destLon = destAirport.lon;
            var destLat = destAirport.lat;
            var destName = destAirport.name || destAirport.iata || destAirport.icao || 'Airport';
            var destLabel = destAirport.iata ? destAirport.iata + ' - ' + destName : destName;

            // Add line source
            try {
                mapInstance.addSource('dest-route-line-src', {
                    type: 'geojson',
                    data: {
                        type: 'Feature',
                        geometry: {

                            coordinates: [[planeLon, planeLat], [destLon, destLat]]
                        },

                    }
                });

                // Dashed line layer (cyan)
                mapInstance.addLayer({

                mapInstance.addSource('dest-airport-dot-src', {

                        geometry: { type: 'Point', coordinates: [destLon, destLat] },
                        properties: { name: destLabel }
                    }
                });

                // Glow
                mapInstance.addLayer({
                    id: 'dest-airport-glow',
                    type: 'circle',
                    source: 'dest-airport-dot-src',
                    paint: {
                        'circle-radius': 14,
                        'circle-color': '#60a5fa',
                        'circle-opacity': 0.2,
                        'circle-blur': 0.7
                    }
                });

                // Dot
                mapInstance.addLayer({
                    id: 'dest-airport-dot',
                    type: 'circle',
                    source: 'dest-airport-dot-src',
                    paint: {
                        'circle-radius': 5,
                        'circle-color': '#60a5fa',
                        'circle-stroke-color': '#ffffff',
                        'circle-stroke-width': 1.5,
                        'circle-opacity': 1
                    }
                });

                // Label
                mapInstance.addLayer({
                    id: 'dest-airport-label',
                    type: 'symbol',
                    source: 'dest-airport-dot-src',
                    layout: {
                        'text-field': ['get', 'name'],
                        'text-size': 12,
                        'text-offset': [0, 1.6],
                        'text-anchor': 'top',
                        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
                        'text-allow-overlap': true
                    },
                    paint: {
